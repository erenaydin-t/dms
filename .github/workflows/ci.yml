name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate gmp_document.json is valid JSON
        run: python3 -m json.tool dms/dms/doctype/gmp_document/gmp_document.json > /dev/null

      - name: Validate apps.json is valid JSON
        run: python3 -m json.tool docker/apps.json > /dev/null

      - name: Compile Python sources
        run: python3 -m compileall -q dms

      - name: Verify __version__ is set
        run: |
          python3 -c "import re; v=re.search(r'__version__\s*=\s*[\"\']([^\"\']+)', open('dms/__init__.py').read()); assert v, 'missing __version__'; print('Version:', v.group(1))"

  test:
    name: "Runtime tests (Docker: ERPNext + HRMS + DMS)"
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL "/usr/local/share/boost" || true
          docker system prune -af >/dev/null 2>&1 || true
          df -h /

      - name: Build DMS image (Frappe v16 + ERPNext + HRMS + DMS + LibreOffice)
        working-directory: docker
        run: |
          DOCKER_BUILDKIT=1 docker build \
            --secret id=apps_json,src=apps.json \
            --build-arg CACHEBUST="$(date +%s)" \
            -t custom-erpnext:latest -f Dockerfile .

      - name: Start stack
        working-directory: docker
        run: |
          cp .env.example .env
          docker compose up -d --remove-orphans
          for i in $(seq 1 90); do
            docker compose exec -T backend bench --version >/dev/null 2>&1 && break
            sleep 3
          done
          docker compose exec -T backend bench --version

      - name: Create site with ERPNext + HRMS + DMS
        working-directory: docker
        run: |
          docker compose exec -T backend bench new-site test_site \
            --no-mariadb-socket \
            --admin-password admin \
            --db-root-password admin \
            --install-app erpnext \
            --install-app hrms \
            --install-app dms

      - name: Overlay the checked-out DMS code and migrate
        working-directory: docker
        run: |
          # The image cloned dms@main; overlay this checkout so the exact commit
          # under test is what runs (important for pull requests).
          docker compose cp ../dms/. backend:/home/frappe/frappe-bench/apps/dms/dms/
          docker compose exec -T backend bench --site test_site migrate
          docker compose exec -T backend bench --site test_site set-config allow_tests true

      - name: Run DMS test suite
        working-directory: docker
        run: |
          # --skip-before-tests avoids ERPNext's setup-wizard bootstrap (not
          # needed by the DMS suite). Covers the GMP Document controller, the
          # permission/visibility model, the reference tree, and the LibreOffice
          # DOCX->PDF end-to-end pipeline.
          docker compose exec -T backend bench --site test_site run-tests --app dms --skip-before-tests
