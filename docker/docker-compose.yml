# Self-contained docker-compose for the DMS module test stack.
# Brings up ERPNext v16 + HRMS + DMS on a fresh site.
#
# First-time bring-up:
#   cp .env.example .env
#   ./update-dms.sh        # builds the image and starts the stack
#   ./create-site.sh       # provisions the site with DMS installed

x-customizable-image: &customizable_image
  image: ${CUSTOM_IMAGE:-custom-erpnext}:${CUSTOM_TAG:-latest}
  pull_policy: never
  restart: unless-stopped

x-backend-defaults: &backend_defaults
  <<: *customizable_image
  depends_on:
    configurator:
      condition: service_completed_successfully
  volumes:
    - sites:/home/frappe/frappe-bench/sites
    - logs:/home/frappe/frappe-bench/logs

services:
  configurator:
    <<: *customizable_image
    restart: "no"
    entrypoint:
      - bash
      - -c
    command:
      - >
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      SOCKETIO_PORT: "9000"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started

  backend:
    <<: *backend_defaults

  frontend:
    <<: *customizable_image
    depends_on:
      - backend
      - websocket
    environment:
      BACKEND: backend:8000
      FRAPPE_SITE_NAME_HEADER: ${SITES:-dms.localhost}
      SOCKETIO: websocket:9000
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: "120"
      CLIENT_MAX_BODY_SIZE: 50m
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    command:
      - nginx-entrypoint.sh
    ports:
      - "${HTTP_PUBLISH_PORT:-8080}:8080"

  websocket:
    <<: *backend_defaults
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js

  queue-short:
    <<: *backend_defaults
    command:
      - bench
      - worker
      - --queue
      - short,default

  queue-long:
    <<: *backend_defaults
    command:
      - bench
      - worker
      - --queue
      - long,default,short

  scheduler:
    <<: *backend_defaults
    command:
      - bench
      - schedule

  db:
    image: mariadb:11.8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-admin}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost --password=$$MYSQL_ROOT_PASSWORD"]
      interval: 2s
      retries: 30

  redis-cache:
    image: redis:6.2-alpine
    restart: unless-stopped
    volumes:
      - redis-cache-data:/data

  redis-queue:
    image: redis:6.2-alpine
    restart: unless-stopped
    volumes:
      - redis-queue-data:/data

volumes:
  sites:
  logs:
  db-data:
  redis-cache-data:
  redis-queue-data:
